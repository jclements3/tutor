<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Harp Tutor</title>
<script src="abc2svg-1.js"></script>
<style>
  /* ---- palette ---- */
  :root {
    --bg:        #0E1116;
    --bg-2:      #161B22;
    --fg:        #E6EDF3;
    --fg-dim:    #8B949E;
    --accent:    #58A6FF;
    --good:      #3FB950;
    --bad:       #F85149;
    --line:      #FFFFFF;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    overflow: hidden;
    user-select: none;
  }
  /* ---- top bar (status + back + prompt) ---- */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 56px;
    display: flex; align-items: center;
    padding: 0 16px;
    background: var(--bg-2);
    border-bottom: 1px solid #21262D;
    z-index: 10;
    gap: 12px;
  }
  #backbtn {
    min-width: 80px; min-height: 44px;
    background: transparent; color: var(--fg);
    border: 1px solid #30363D; border-radius: 8px;
    font-size: 16px; cursor: pointer;
    display: none;
    flex-shrink: 0;
  }
  #backbtn:active { background: #21262D; }
  #prompt {
    flex: 1;
    text-align: center;
    font-size: 22px; font-weight: 300;
    color: var(--fg);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    min-width: 0;
  }
  #prompt .hymn-progress {
    color: var(--fg-dim);
    font-size: 14px;
    margin-left: 16px;
  }
  #status {
    font-size: 13px; color: var(--fg-dim);
    max-width: 30%; text-align: right;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex-shrink: 0;
  }
  #status.ok { color: var(--good); }
  /* ---- main scrollable area below topbar ---- */
  #main {
    position: fixed; top: 56px; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column;
    padding: 16px;
    overflow: hidden;
  }
  /* ---- home screen ---- */
  .home {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%;
    gap: 24px;
  }
  .home h1 { margin: 0 0 8px; font-weight: 300; font-size: 36px; letter-spacing: 1px; }
  .home p  { margin: 0; color: var(--fg-dim); font-size: 16px; }
  .menu {
    display: flex; flex-wrap: wrap; gap: 20px; justify-content: center;
    margin-top: 24px;
  }
  .menu button {
    min-width: 240px; min-height: 120px;
    padding: 24px;
    background: var(--bg-2); color: var(--fg);
    border: 1px solid #30363D; border-radius: 12px;
    font-size: 22px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .menu button:active { background: #21262D; border-color: var(--accent); }
  .menu small { color: var(--fg-dim); font-size: 13px; }
  /* ---- drill screen ---- */
  .drill {
    display: flex; flex-direction: column;
    height: 100%;
    gap: 12px;
  }
  .stage {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-2);
    border-radius: 12px;
    transition: background 120ms ease;
    overflow: hidden;
  }
  .stage.flash-bad { background: #4a1a1a; }
  .stage.flash-good { background: #1a4a26; }
  /* abc2svg emits SVG with currentColor-based ink and explicit width/height
     px attributes. Override to white-on-transparent and scale to fit. */
  .stage .abc {
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%; color: var(--line);
    /* Brace-cusp centring is applied dynamically by JS after each SVG
       render (see centerBraceCusp). It varies per-chord because each
       voicing has different vertical content extent. */
  }
  .stage .abc svg {
    display: block; margin: 0 auto;
    width: auto; height: auto;
    max-width: 100%; max-height: 100%;
    background: transparent;
  }
  .stats-inline {
    display: flex; gap: 20px; flex: 1;
    align-items: center; color: var(--fg-dim); font-size: 13px;
  }
  .stats-inline .item { display: flex; gap: 4px; align-items: baseline; }
  .stats-inline .num { color: var(--accent); font-weight: 500; font-size: 18px; }
  .stats-inline .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .held {
    background: var(--bg-2); border-radius: 8px;
    padding: 8px 12px;
    font-family: "SF Mono", Consolas, monospace;
    font-size: 13px;
    color: var(--fg-dim);
    min-height: 34px;
    display: flex; align-items: center; gap: 8px;
    overflow-x: auto;
  }
  .held .pill {
    background: #21262D; color: var(--fg);
    padding: 2px 8px; border-radius: 12px;
    white-space: nowrap;
  }
  .toolbar {
    display: flex; gap: 12px;
    justify-content: space-between;
    align-items: center;
  }
  .toolbar .toolbar-buttons {
    display: flex; gap: 12px;
    flex-shrink: 0;
  }
  .toolbar button {
    min-height: 40px; padding: 0 16px;
    background: transparent; color: var(--fg-dim);
    border: 1px solid #30363D; border-radius: 8px;
    font-size: 14px; cursor: pointer;
  }
  .toolbar button:active { background: #21262D; }
  /* ---- chord-drill filter chips ---- */
  .chord-filters {
    display: flex; flex-wrap: wrap; gap: 4px;
    justify-content: center; align-items: center;
    margin: 0 0 4px;
  }
  .chord-filters button {
    padding: 2px 10px; min-height: 28px;
    background: transparent; color: var(--fg-dim);
    border: 1px solid #30363D; border-radius: 14px;
    font-size: 12px; cursor: pointer;
  }
  .chord-filters button.on {
    background: var(--accent); color: var(--bg);
    border-color: var(--accent); font-weight: 500;
  }
  .chord-filters button:active { opacity: 0.7; }
  .chord-filters .sep {
    color: var(--fg-dim); opacity: 0.5;
    padding: 0 4px; font-size: 14px;
  }
  /* ---- hymn picker ---- */
  .picker {
    display: flex; flex-direction: column;
    height: 100%; gap: 12px;
  }
  .picker .title { font-size: 22px; font-weight: 300; color: var(--fg); }
  .picker .search input {
    width: 100%; box-sizing: border-box;
    padding: 12px 16px; min-height: 48px;
    background: var(--bg-2); color: var(--fg);
    border: 1px solid #30363D; border-radius: 8px;
    font-size: 16px; outline: none;
  }
  .picker .search input:focus { border-color: var(--accent); }
  .picker .list {
    flex: 1; overflow-y: auto;
    background: var(--bg-2); border-radius: 12px;
    -webkit-overflow-scrolling: touch;
    padding: 6px;
  }
  /* Hymn list: 4-column grid. Drill list keeps the original single-column. */
  .picker .list.grid3 {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 0px 4px;
  }
  .picker .row {
    display: flex; align-items: center;
    padding: 12px 14px; min-height: 48px;
    border-bottom: 1px solid #21262D;
    cursor: pointer;
    gap: 12px;
    border-radius: 6px;
  }
  .picker .list.grid3 .row {
    padding: 4px 8px; min-height: 28px; gap: 8px;
    border-bottom: none;
  }
  .picker .row:active { background: #21262D; }
  .picker .row:last-child { border-bottom: none; }
  .picker .num {
    font-family: "SF Mono", Consolas, monospace;
    color: var(--accent); font-size: 14px;
    min-width: 38px;
    flex-shrink: 0;
  }
  .picker .ttl {
    color: var(--fg); font-size: 14px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .picker .count { color: var(--fg-dim); font-size: 13px; }
  /* ---- recent-hymns dropdown ---- */
  .recent-wrap { position: relative; display: inline-block; margin-left: 8px; }
  .recent-btn {
    background: var(--bg-2); color: var(--fg);
    border: 1px solid var(--bg-3); border-radius: 8px;
    padding: 8px 14px; font-size: 14px; cursor: pointer;
  }
  .recent-btn:active { background: var(--bg-3); }
  .recent-menu {
    position: absolute; top: 110%; left: 0;
    min-width: 280px; max-width: 420px;
    background: var(--bg-2); border: 1px solid var(--bg-3);
    border-radius: 8px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    padding: 4px;
    z-index: 100;
    display: none;
  }
  .recent-menu.open { display: block; }
  .recent-menu .item {
    display: flex; gap: 10px;
    padding: 8px 10px; border-radius: 6px;
    cursor: pointer;
  }
  .recent-menu .item:active { background: var(--bg-3); }
  .recent-menu .item .num {
    font-family: "SF Mono", Consolas, monospace;
    color: var(--accent); font-size: 13px;
    min-width: 38px; flex-shrink: 0;
  }
  .recent-menu .item .ttl {
    color: var(--fg); font-size: 14px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .recent-menu .empty {
    color: var(--fg-dim); padding: 10px; font-size: 13px;
  }
  /* ---- hymn practice (scrollable score) ---- */
  .hymn-stage {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-2);
    border-radius: 12px;
    padding: 16px;
    color: var(--line);
    overflow: hidden;
  }
  .hymn-stage.tappable { cursor: pointer; }
  .hymn-stage.tappable:active { background: #1f2530; }
  /* Brace-cusp centring is applied dynamically by JS after each render
     (see centerBraceCusp). Static fallback: no transform. */
  .hymn-stage .abc {
    display: block; color: var(--line);
  }
  .hymn-stage .abc svg {
    display: block; margin: 0 auto;
    width: auto; height: auto;
    background: transparent;
  }
  .hymn-stage .abc-stack {
    display: block;
  }
  .hymn-stage .abc-stack .abc { display: block; }
  .hymn-stage .abc-stack .abc + .abc { margin-top: 4px; }
</style>

<body>

<div id="topbar">
  <button id="backbtn">&larr; Back</button>
  <div id="prompt"></div>
  <div id="status">waiting for MIDI...</div>
</div>
<div id="main"></div>

<script>
"use strict";

/* =====================================================================
 * Harp Tutor v1
 * Two drills: note reading + triad recognition. Pure SVG staff, no deps.
 * MIDI events come in from the Android host as window.onMidiNote / off /
 * status callbacks; we maintain a Set of currently-held notes and check
 * the player's answer against the current target.
 * ===================================================================== */

// ----- Music theory bits -----
const NOTE_NAMES_SHARP = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const NATURAL_PCS = [0,2,4,5,7,9,11]; // C D E F G A B

function midiToName(m) {
  const pc = ((m % 12) + 12) % 12;
  const oct = Math.floor(m / 12) - 1;
  return NOTE_NAMES_SHARP[pc] + oct;
}
// Diatonic step index (C=0, D=1, ... B=6) -> used for vertical staff position.
const DIATONIC = {0:0, 2:1, 4:2, 5:3, 7:4, 9:5, 11:6}; // pc -> step
function midiToStepIndex(m) {
  // Returns an integer "staff step" where C4 = 0, D4 = 1, etc.
  // For accidentals, we use the natural's step (sharp displays beside natural notehead).
  const pc = ((m % 12) + 12) % 12;
  const oct = Math.floor(m / 12) - 1;
  // Reduce accidentals to the natural step below.
  const natural = (pc in DIATONIC) ? pc : (pc - 1);
  const step = DIATONIC[natural];
  return (oct - 4) * 7 + step;
}

// ----- App state -----
const state = {
  screen: "home",            // "home" | "notes" | "chords" | "hymns-picker" | "hymns-practice" | "book-picker" | "book-practice"
  target: null,              // current drill target (depends on mode)
  shownAt: 0,                // timestamp when target became visible
  held: new Set(),           // currently held MIDI notes
  stats: loadStats(),
  streak: 0,
  recentTimes: [],           // ms-to-correct for current session, for median
  drillIdx: 0,               // currently selected drill from the Drill Book
  chordFilters: null,        // initialized below once loadChordFilters is defined
};

function loadStats() {
  try {
    const raw = localStorage.getItem("harpTutorStats");
    if (raw) return JSON.parse(raw);
  } catch (_) {}
  return { notes: {correct:0,total:0,times:[]}, chords: {correct:0,total:0,times:[]} };
}
function saveStats() {
  try { localStorage.setItem("harpTutorStats", JSON.stringify(state.stats)); } catch(_){}
}
function median(arr) {
  if (!arr.length) return 0;
  const s = arr.slice().sort((a,b)=>a-b);
  const m = Math.floor(s.length/2);
  return s.length % 2 ? s[m] : Math.round((s[m-1]+s[m])/2);
}

// ----- MIDI hooks exposed to Android host -----
window.onMidiNote = function(note, vel) {
  state.held.add(note);
  renderHeld();
  // Hymn practice: time-based auto-advance. abc2svg renders noteheads via
  // an embedded music font (not via reusable <use> refs) so we can't
  // easily count them. Instead, after the player has stopped triggering
  // note-on events for ~1.5 s, advance to the next system.
  if ((state.screen === "hymns-practice" || state.screen === "book-practice") && !state.hymnAdvancing) {
    if (state.hymnAdvanceTimer) clearTimeout(state.hymnAdvanceTimer);
    state.hymnAdvanceTimer = setTimeout(() => {
      state.hymnAdvancing = true;
      if (state.screen === "book-practice") nextDrill();
      else                                   advanceHymnPage();
    }, 1500);
  }
  checkAnswer();
};
window.onMidiNoteOff = function(note) {
  state.held.delete(note);
  renderHeld();
};
window.onMidiStatus = function(msg) {
  const el = document.getElementById("status");
  el.textContent = msg || "";
  // crude positive-state detection: anything starting with "connected" or "synth"
  el.classList.toggle("ok", /^connected|^synth/i.test(msg || ""));
};

// ----- Answer checking -----
function checkAnswer() {
  if (!state.target) return;
  if (state.screen === "notes") {
    // Single note: match exact MIDI (octave matters; this is a reading drill).
    if (state.held.has(state.target.midi)) {
      acceptCorrect();
    }
  } else if (state.screen === "chords") {
    // Match by pitch class. All three chord PCs must be present in held set.
    const needed = new Set(state.target.pcs);
    const heldPcs = new Set([...state.held].map(n => ((n%12)+12)%12));
    let ok = true;
    needed.forEach(pc => { if (!heldPcs.has(pc)) ok = false; });
    if (ok) acceptCorrect();
  }
}

let lockUntil = 0;
function acceptCorrect() {
  // Debounce so a brief release-and-re-press doesn't double-count.
  if (Date.now() < lockUntil) return;
  lockUntil = Date.now() + 400;

  const dt = Date.now() - state.shownAt;
  const bucket = state.screen === "notes" ? state.stats.notes : state.stats.chords;
  bucket.correct++; bucket.total++;
  bucket.times.push(dt);
  if (bucket.times.length > 50) bucket.times.shift();
  state.streak++;
  saveStats();
  flashStage("good");
  setTimeout(nextTarget, 350);
}
function recordWrong() {
  const bucket = state.screen === "notes" ? state.stats.notes : state.stats.chords;
  bucket.total++;
  state.streak = 0;
  saveStats();
  flashStage("bad");
}
function flashStage(kind) {
  const stage = document.querySelector(".stage");
  if (!stage) return;
  stage.classList.add("flash-" + kind);
  setTimeout(() => stage.classList.remove("flash-" + kind), 250);
}

// ----- Drill: next target -----
const NOTE_MIN = 36, NOTE_MAX = 72;   // SMK-37 PRO keyboard range
function pickRandomNaturalMidi() {
  // Naturals only, constrained to what reads sensibly on a soprano clef.
  // Soprano clef: middle C (MIDI 60) sits on the BOTTOM line; the top line
  // is D5 (MIDI 74). Pick notes that fall within roughly 2 ledger lines of
  // either edge of the staff -> MIDI 55 (G3, one ledger below) up to MIDI
  // 79 (G5, two ledger lines above), then clamp to SMK keyboard range.
  const SOPRANO_MIN = Math.max(55, NOTE_MIN);  // G3, ~1 ledger below staff
  const SOPRANO_MAX = Math.min(79, NOTE_MAX);  // ceiling at SMK top = 72
  while (true) {
    const m = SOPRANO_MIN + Math.floor(Math.random() * (SOPRANO_MAX - SOPRANO_MIN + 1));
    if (NATURAL_PCS.includes(((m%12)+12)%12)) return m;
  }
}
// Chord vocabulary. Triads / 7ths use single-hand placement with random
// inversion. 9ths / 13ths exceed a single hand's reach, so they use a
// "spread" voicing -- LH plays root + 5th, RH plays the upper structure
// (3rd, 7th, plus 9th-as-2nd or 13th-as-6th to keep the RH span <= 10).
const CHORD_TYPES = [
  // Triads
  { suffix: " major", category: "triads",      intervals: [0,4,7] },
  { suffix: " minor", category: "triads",      intervals: [0,3,7] },
  // 7ths
  { suffix: "maj7",   category: "sevenths",    intervals: [0,4,7,11] },
  { suffix: "7",      category: "sevenths",    intervals: [0,4,7,10] },
  { suffix: "m7",     category: "sevenths",    intervals: [0,3,7,10] },
  // 9ths (extended). rhPcOffsets define the RH upper structure relative
  // to the chord root pc.
  { suffix: "maj9",   category: "ninths",      intervals: [0,4,7,11,14], extended: true, rhPcOffsets: [4,11,2] },
  { suffix: "9",      category: "ninths",      intervals: [0,4,7,10,14], extended: true, rhPcOffsets: [4,10,2] },
  { suffix: "m9",     category: "ninths",      intervals: [0,3,7,10,14], extended: true, rhPcOffsets: [3,10,2] },
  // 13ths (extended). 13th treated as the 6th for compactness.
  { suffix: "maj13",  category: "thirteenths", intervals: [0,4,7,11,14,9], extended: true, rhPcOffsets: [4,11,9] },
  { suffix: "13",     category: "thirteenths", intervals: [0,4,7,10,14,9], extended: true, rhPcOffsets: [4,10,9] },
  { suffix: "m13",    category: "thirteenths", intervals: [0,3,7,10,14,9], extended: true, rhPcOffsets: [3,10,9] },
];
const ROOT_LETTERS = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
// SMK-37 PRO: 37 keys, C2..C5 (MIDI 36..72). Everything the user can play
// must fit within this range. Middle C = MIDI 60 = the boundary between LH
// (36..59) and RH (60..72) -- though only 13 RH keys means chord choices are
// tight; we let the chord generator try many candidates until something fits.
const PIANO_MIN = 36, PIANO_MAX = 72, MID_C = 60, MAX_SPAN = 10;

// Apply an inversion to a chord's intervals; return the offsets from the
// new bass note (smallest after inversion) in ascending order.
function chordOffsetsFromBass(intervals, inv) {
  const ivs = intervals.map((v, i) => v + (i < inv ? 12 : 0)).sort((a,b) => a-b);
  return ivs.map(v => v - ivs[0]);
}
function chordBassPc(rootPc, intervals, inv) {
  const ivs = intervals.map((v, i) => v + (i < inv ? 12 : 0)).sort((a,b) => a-b);
  return ((rootPc + ivs[0]) % 12 + 12) % 12;
}
// Place a chord in the RH (all notes > middle C) or LH (all notes < middle C)
// range. Span constraint: top - bottom <= MAX_SPAN semitones (a hand reach).
// Voicing is biased so LH stacks at the BOTTOM of its range and RH stacks
// at the TOP of its range -- maximises the gap between the two hands so
// polychords don't sound muddy.
function placeChord(rootPc, intervals, inv, hand) {
  const offsets = chordOffsetsFromBass(intervals, inv);
  const span = offsets[offsets.length - 1];
  if (span > MAX_SPAN) return null;
  const bassPc = chordBassPc(rootPc, intervals, inv);
  const cands = [];
  if (hand === "rh") {
    for (let m = bassPc; m + span <= PIANO_MAX; m += 12) {
      if (m > MID_C) cands.push(m);
    }
  } else {
    for (let m = bassPc; m + span < MID_C; m += 12) {
      if (m >= PIANO_MIN) cands.push(m);
    }
  }
  if (!cands.length) return null;
  // Bias: RH to highest octave, LH to lowest.
  const bass = hand === "rh" ? cands[cands.length - 1] : cands[0];
  return offsets.map(o => bass + o);
}
function chordName(rootPc, suffix) { return ROOT_LETTERS[rootPc] + suffix; }

// Place an extended chord (9th/13th). LH = root + 5th in lowest octave.
// RH = upper structure (3rd, 7th, 9th-as-2nd or 13th-as-6th) all within
// the RH range, with span <= MAX_SPAN.
function placeExtendedChord(rootPc, rhPcOffsets) {
  // LH: lowest octave where root + 5th fit below middle C.
  let lhBass = null;
  for (let r = rootPc; r + 7 < MID_C; r += 12) {
    if (r >= PIANO_MIN) { lhBass = r; break; }
  }
  if (lhBass == null) return null;
  // RH: each chord tone has 1 or 2 candidate MIDIs in (60..PIANO_MAX].
  const rhChoices = rhPcOffsets.map(off => {
    const pc = ((rootPc + off) % 12 + 12) % 12;
    const cands = [];
    let m = pc; while (m <= MID_C) m += 12;
    for (; m <= PIANO_MAX; m += 12) cands.push(m);
    return cands;
  });
  if (rhChoices.some(c => c.length === 0)) return null;
  // Brute-force combinations -- typically <= 2^3 = 8 to try.
  function search(idx, acc) {
    if (idx === rhChoices.length) {
      const sorted = acc.slice().sort((a,b) => a-b);
      if (sorted[sorted.length - 1] - sorted[0] <= MAX_SPAN) return sorted;
      return null;
    }
    for (const c of rhChoices[idx]) {
      acc.push(c);
      const hit = search(idx + 1, acc);
      acc.pop();
      if (hit) return hit;
    }
    return null;
  }
  const rh = search(0, []);
  if (!rh) return null;
  return { lh: [lhBass, lhBass + 7], rh };
}

// Default filter state: everything on. Persisted in localStorage.
function defaultChordFilters() {
  return {
    triads: true, sevenths: true, ninths: true, thirteenths: true,
    inv0: true, inv1: true, inv2: true, inv3: true,
    polychord: true,
  };
}
function loadChordFilters() {
  try {
    const s = JSON.parse(localStorage.getItem("harpTutorChordFilters"));
    return Object.assign(defaultChordFilters(), s || {});
  } catch (_) { return defaultChordFilters(); }
}
function saveChordFilters() {
  try { localStorage.setItem("harpTutorChordFilters", JSON.stringify(state.chordFilters)); } catch(_) {}
}

function pickRandomChord() {
  const f = state.chordFilters;
  const activeTypes = CHORD_TYPES.filter(t => f[t.category]);
  const activeInvs  = [0,1,2,3].filter(i => f["inv" + i]);
  if (!activeTypes.length || !activeInvs.length) {
    return { name: "(enable a chord type + an inversion)", rhMidis: [], lhMidis: [], pcs: [] };
  }
  const polyOk = f.polychord;
  for (let tries = 0; tries < 60; tries++) {
    const t  = activeTypes[Math.floor(Math.random() * activeTypes.length)];
    const pc = Math.floor(Math.random() * 12);
    let rh, lh, name;
    if (t.extended) {
      // 9th / 13th: spread across both hands, root position only.
      const placed = placeExtendedChord(pc, t.rhPcOffsets);
      if (!placed) continue;
      rh = placed.rh; lh = placed.lh;
      name = chordName(pc, t.suffix);
      const allPcs = [...rh, ...lh].map(m => ((m % 12) + 12) % 12);
      return { name, rhMidis: rh, lhMidis: lh, pcs: allPcs };
    }
    // Triad or 7th: single-hand chord with selected inversion.
    const validInvs = activeInvs.filter(i => i < t.intervals.length);
    if (!validInvs.length) continue;
    const inv = validInvs[Math.floor(Math.random() * validInvs.length)];
    rh = placeChord(pc, t.intervals, inv, "rh");
    if (!rh) continue;
    name = chordName(pc, t.suffix);
    // Choose voicing: LH-bass or polychord (if enabled).
    const usePoly = polyOk && Math.random() < 0.4;
    if (!usePoly) {
      // LH single bass note, lowest octave.
      const lhCands = [];
      for (let m = pc; m < MID_C; m += 12) {
        if (m >= PIANO_MIN) lhCands.push(m);
      }
      if (!lhCands.length) continue;
      return {
        name,
        rhMidis: rh,
        lhMidis: [lhCands[0]],
        pcs: rh.map(m => ((m % 12) + 12) % 12),
      };
    }
    // Polychord: a second, distinct triad/7th in LH (NOT extended, NOT
    // restricted by inversion filter -- the LH stays in root pos for clarity).
    const polyTypes = activeTypes.filter(x => !x.extended);
    if (!polyTypes.length) continue;
    for (let tries2 = 0; tries2 < 20; tries2++) {
      const t2  = polyTypes[Math.floor(Math.random() * polyTypes.length)];
      const pc2 = Math.floor(Math.random() * 12);
      if (pc2 === pc && t2.suffix === t.suffix) continue;
      lh = placeChord(pc2, t2.intervals, 0, "lh");
      if (!lh) continue;
      return {
        name: name + " / " + chordName(pc2, t2.suffix),
        rhMidis: rh,
        lhMidis: lh,
        pcs: [...rh, ...lh].map(m => ((m % 12) + 12) % 12),
      };
    }
  }
  // Fallback if nothing fits with current filters.
  const rh = placeChord(0, [0,4,7], 0, "rh") || [72,76,79];
  return { name: "C major", rhMidis: rh, lhMidis: [36], pcs: [0,4,7] };
}
function nextTarget() {
  if (state.screen === "notes") {
    state.target = { midi: pickRandomNaturalMidi() };
  } else {
    state.target = pickRandomChord();
  }
  state.shownAt = Date.now();
  // If the user is still holding the previous answer notes, give them a beat
  // to lift before checkAnswer fires again.

}

// ----- Staff renderer (abc2svg) -----
// Build a tiny ABC document for the current drill prompt and let
// abc2svg render proper engraved notation. The abc2svg library is loaded
// from abc2svg-1.js in the same directory.

// MIDI -> ABC pitch token. ABC convention: middle-C = "C" (uppercase, no
// marks); each octave up flips letter case and adds an apostrophe; each
// octave down adds a comma. Sharps prefix "^", flats prefix "_".
function midiToAbc(midi) {
  const SHARP_LETTERS = ["C","C","D","D","E","F","F","G","G","A","A","B"];
  const SHARP_ACC     = ["", "^", "", "^", "", "", "^", "", "^", "", "^", ""];
  const pc  = ((midi % 12) + 12) % 12;
  const oct = Math.floor(midi / 12) - 1;   // C4=60 -> oct 4
  const letter = SHARP_LETTERS[pc];
  const acc    = SHARP_ACC[pc];
  // ABC default register: uppercase letter = octave 4-ish.
  // Specifically C..B = MIDI 60..71; c..b = MIDI 72..83.
  // For oct >= 5: lowercase + (oct - 5) apostrophes
  // For oct <= 4: uppercase + (4 - oct) commas
  let letterOct, mark;
  if (oct >= 5) {
    letterOct = letter.toLowerCase();
    mark      = "'".repeat(oct - 5);
  } else {
    letterOct = letter;
    mark      = ",".repeat(4 - oct);
  }
  return acc + letterOct + mark;
}

// Build ABC source for the current target. Renders on a single soprano-clef
// staff (C clef on the bottom line, so middle C = bottom line) -- matches
// the soprano-clef hymnal used in Hymn Practice. Both LH and RH chord
// voices stack onto the same staff as a single chord token.
function buildAbc(screen, target) {
  const header =
    "X:1\n" +
    "M:none\n" +
    "L:1/4\n" +
    "%%pagewidth 18cm\n" +
    "%%leftmargin 1cm\n" +
    "%%rightmargin 1cm\n" +
    "%%scale 8\n" +
    "K:C clef=C1\n";
  if (screen === "notes") {
    return header + midiToAbc(target.midi) + "4\n";
  }
  // Chord drill: stack every LH + RH note into one chord on the soprano staff.
  const midis = [...(target.lhMidis || []), ...(target.rhMidis || [])]
    .slice().sort((a, b) => a - b);
  if (!midis.length) return header + "z4\n";
  return header + "[" + midis.map(midiToAbc).join("") + "]4\n";
}

// Render an ABC string into the given HTML container element.
function renderAbc(abcText, container) {
  container.innerHTML = "";
  if (typeof Abc !== "function") {
    container.textContent = "(abc2svg not loaded)";
    return;
  }
  const chunks = [];
  try {
    const abc = new Abc({
      img_out(s)   { chunks.push(s); },
      errmsg(m,l,c){ console.warn("abc2svg:", m, "line", l, "col", c); },
      read_file()  { return ""; },
      anno_stop()  {},
    });
    abc.tosvg("drill.abc", abcText);
  } catch (e) {
    container.textContent = "render error: " + e.message;
    return;
  }
  const wrap = document.createElement("div");
  wrap.className = "abc";
  wrap.innerHTML = chunks.join("\n");
  container.appendChild(wrap);
  // Once the SVG is in the DOM and the browser has laid it out, dynamically
  // shift it so the grand-staff brace cusp (the pinch of the "{" between
  // treble + bass) sits at the stage's vertical centre. Each chord voicing
  // produces a different SVG height, so a fixed translate would only work
  // for one voicing -- this measures and adjusts per render.
  requestAnimationFrame(() => { fitSvgToStage(container); centerBraceCusp(container); });
}
// Scale the SVG via CSS transform so its content roughly fills the stage,
// preserving aspect ratio. abc2svg emits the SVG at a natural size derived
// from %%scale + %%pagewidth, which on a 1920x1200 tablet leaves a lot of
// blank space without this. We measure the SVG's bbox in screen pixels and
// scale uniformly until either width or height fills ~85% of the stage.
function fitSvgToStage(container) {
  const svg = container.querySelector("svg");
  if (!svg) return;
  svg.style.transform = "";  // measure at 1x first
  let svgRect;
  try { svgRect = svg.getBoundingClientRect(); } catch (_) { return; }
  if (!svgRect.width || !svgRect.height) return;
  const cRect = container.getBoundingClientRect();
  const sx = (cRect.width  * 0.98) / svgRect.width;
  const sy = (cRect.height * 0.95) / svgRect.height;
  const s  = Math.min(sx, sy);
  // Stash the scale; centerBraceCusp composes its translateY with this.
  svg.dataset.fitScale = (s > 1.01 ? s : 1).toFixed(3);
  if (s > 1.01) {
    svg.style.transformOrigin = "center center";
    svg.style.transform = `scale(${s.toFixed(3)})`;
  }
}
// Position the rendered grand-staff SVG so the brace cusp lands at the
// vertical centre of `container`. abc2svg emits one <use href="#stdef">
// per staff at the staff's TOP-line Y in viewBox coords. With two staves,
// the brace cusp sits between treble-bottom and bass-top -- approximately
// the midpoint of the two anchor Ys (since both staves have equal height).
function centerBraceCusp(container) {
  const svg = container.querySelector("svg");
  if (!svg) return;
  // Collect every vertical bar path emitted by abc2svg. The library writes
  // these as a single-segment `M x y v h` (lowercase, relative). Sort by
  // height to distinguish:
  //   - LONG bars (>~50 viewBox units) span both staves of a grand staff;
  //     the LEFTMOST one is the grand-staff joining bar -- its midpoint is
  //     the brace cusp.
  //   - SHORT bars (~24 units, i.e. one staff height) are barlines on a
  //     single-staff system; their midpoint is the staff centre line.
  // Anything else (note stems, ledger flecks) is ignored.
  let longBar = null, longBarH = 0, longBarX = 1e9;
  const shortBars = [];
  for (const p of svg.querySelectorAll("path")) {
    const d = p.getAttribute("d") || "";
    const m = d.match(/^m\s*([-\d.]+)\s+([-\d.]+)\s*v\s*(-?[\d.]+)/);
    if (!m) continue;
    const x = parseFloat(m[1]);
    const h = Math.abs(parseFloat(m[3]));
    if (h >= 50) {
      if (x < longBarX - 5 || (Math.abs(x - longBarX) <= 5 && h > longBarH)) {
        longBar = p; longBarH = h; longBarX = x;
      }
    } else if (h >= 18 && h <= 40) {
      // Plausible single-staff barline (one staff is 24 viewBox units tall).
      shortBars.push(p);
    }
  }
  let refEl = null;
  let bbox = null;
  if (longBar) {
    refEl = longBar;
    bbox  = longBar.getBBox();
  } else if (shortBars.length) {
    // Use the staff centre line implied by the (consistent) barline span.
    // Take the median y of all short-bar bboxes for robustness.
    const mids = shortBars.map(p => {
      const b = p.getBBox();
      return { el: p, mid: b.y + b.height / 2, b };
    }).sort((a, b) => a.mid - b.mid);
    const median = mids[Math.floor(mids.length / 2)];
    refEl = median.el;
    // Build a zero-width bbox at the staff centre; only the y midpoint is
    // used below, so width is irrelevant.
    bbox = { x: median.b.x, y: median.mid, width: 0, height: 0 };
  } else {
    // Last-resort fallback: SVG content bbox. Bias the centre toward the
    // staff lines (top of bbox usually = first staff line, since clefs
    // rarely poke higher than the chord-symbol text but might tie). We just
    // use the raw bbox midpoint here.
    try { bbox = svg.getBBox(); } catch (_) { return; }
    refEl = svg;
  }
  const ctm = refEl.getScreenCTM();
  if (!ctm) return;
  const pt = svg.createSVGPoint();
  pt.x = bbox.x + bbox.width  / 2;
  pt.y = bbox.y + bbox.height / 2;
  const screen = pt.matrixTransform(ctm);
  const cRect = container.getBoundingClientRect();
  const targetY = cRect.top + cRect.height / 2;
  const offset  = targetY - screen.y;
  // Compose translateY with the fit-scale (set by fitSvgToStage).
  const fitScale = parseFloat(svg.dataset.fitScale || "1");
  svg.style.transformOrigin = "center center";
  svg.style.transform = `translateY(${offset.toFixed(1)}px) scale(${fitScale})`;
}

const RECENT_HYMNS_KEY = "harpTutorRecentHymns";

function loadRecentHymns() {

function pushRecentHymn(idx) {

function renderHymnsPractice() {
  const h = (state.hymns || [])[state.hymnIdx];
  if (!h) { renderHome(); return; }
  const label = `${String(h.n).padStart(3, "0")} ${h.title}`;
  document.getElementById("prompt").innerHTML =
    `<span>${escapeHtml(label)}</span>` +
    `<span id="hymn-progress" class="hymn-progress"></span>`;
  mountRecentHymnsDropdown();
  document.getElementById("main").innerHTML = `
    <div class="drill">
      <div class="hymn-stage tappable" id="hymn-stage">
        <div style="color:var(--fg-dim);text-align:center;padding:24px">loading hymn...</div>
      </div>
      <div class="held" id="held"></div>
    </div>`;
  renderHeld();
  // XHR rather than fetch: Android WebView blocks fetch() on file://
  // even with allowFileAccessFromFileURLs set.
  const xhr = new XMLHttpRequest();
  xhr.open("GET", `hymns/${state.hymnIdx}.abc`);
  xhr.onload = () => {
    const container = document.getElementById("hymn-stage");
    if (!container) return;
    if (xhr.status !== 0 && xhr.status !== 200) {
      container.textContent = "Failed to load hymn: HTTP " + xhr.status;
      return;
    }
    // Strip everything that produces title text, credits, lyrics, headers
    // and footers so only the music notation renders. We keep:
    //   X (tune#), M (meter), L (length), Q (tempo), K (key), V (voice),
    //   %%staves, %%MIDI, %%scale, %%pagewidth, music body.
    const stripped = xhr.responseText.split("\n").filter(line => {
      const lt = line.trim();
      // ABC field lines (single letter + colon) -- strip text/lyric ones.
      // T=title, C=composer, S=source, w/W=words/lyrics, H=history,
      // N=notes, A=area, G=group, O=origin, R=rhythm, B=book, D=disco,
      // Q=tempo (we drop it so the marker doesn't bias vertical centering).
      if (/^[TCSwWHNAGORBDQ]:/.test(lt)) return false;
      // Page-level %% directives that emit text.
      if (/^%%(header|footer|info|postscript|titlefont|composerfont|leftmargin|rightmargin|topmargin|botmargin|vocalfont|wordsfont|infofont|footerfont|headerfont|partsfont)/.test(lt)) return false;
      // OpenHymnal-specific metadata comments (e.g. %OHSCRIP, %OHTOPICS).
      if (/^%OH/.test(lt)) return false;
      return true;
    }).join("\n");
    // Layout tweaks for tablet and inline-annotation cleanup:
    //   - Strip inline [Q:...] tempo annotations that bias vertical centering
    //   - Strip inline [I:...] info / annotation markup
    // Keep "^..." chord annotations -- the soprano hymnal puts Roman numeral
    // analysis there ("^V", "^I6", etc.) and the user wants to see them.
    const txt = stripped
      .replace(/^%%pagewidth.*$/gm, "%%pagewidth 36cm")
      .replace(/^%%pageheight.*$/gm, "")
      .replace(/^%%scale\s.*$/gm, "%%scale 6")
      .replace(/^%%stretchlast\s.*$/gm, "%%stretchlast 1")
      .replace(/^%%leftmargin\s.*$/gm, "%%leftmargin 0.5cm")
      .replace(/^%%rightmargin\s.*$/gm, "%%rightmargin 0.5cm")
      .replace(/\[[QI]:[^\]]*\]/g, "");
    // Inject tight margins if the source didn't set them.
    let prepared = txt;
    if (!/^%%leftmargin\s/m.test(prepared))  prepared = "%%leftmargin 0.5cm\n"  + prepared;
    if (!/^%%rightmargin\s/m.test(prepared)) prepared = "%%rightmargin 0.5cm\n" + prepared;
    // Render via abc2svg and split into separate systems.
    const chunks = [];
    if (typeof Abc !== "function") {
      container.textContent = "(abc2svg not loaded)";
      return;
    }
    try {
      const abc = new Abc({
        img_out(s)   { chunks.push(s); },
        errmsg(m,l,c){ console.warn("abc2svg:", m, l, c); },
        read_file()  { return ""; },
        anno_stop()  {},
      });
      abc.tosvg("hymn.abc", prepared);
    } catch (e) {
      container.textContent = "render error: " + e.message;
      return;
    }
    state.hymnPages = normalizeAbcSystems(chunks);
    state.hymnPage  = 0;
    showHymnPage();
  };
  xhr.onerror = () => {
    const container = document.getElementById("hymn-stage");
    if (container) container.textContent = "Failed to load hymn";
  };
  xhr.send();
}

function showHymnPage() {
  const container = document.getElementById("hymn-stage");
  const prog      = document.getElementById("hymn-progress");
  if (!container || !state.hymnPages) return;
  const n = state.hymnPages.length;
  if (n === 0) {
    container.innerHTML = '<div style="color:var(--fg-dim);text-align:center;padding:24px">(no notation found)</div>';
    if (prog) prog.textContent = "";
    return;
  }
  // Render ALL systems on a single page, stacked. fitStackToStage will
  // resize the whole stack via CSS zoom (which affects layout box, unlike
  // transform:scale, so the stacked SVGs don't overlap). For book-practice
  // (drills), still one system per "page" since drills list paginates.
  const which = state.screen === "book-practice"
    ? [state.hymnPages[state.hymnPage]]
    : state.hymnPages;
  container.innerHTML =
    `<div class="abc-stack">${which.map(s => `<div class="abc">${s}</div>`).join("")}</div>`;
  requestAnimationFrame(() => { fitStackToStage(container); });
  // Reset auto-advance state for the new system.
  state.hymnAdvancing = false;
  if (state.hymnAdvanceTimer) { clearTimeout(state.hymnAdvanceTimer); state.hymnAdvanceTimer = null; }
  // Hide the page indicator when the whole hymn is on one page.
  if (prog) prog.textContent = (state.screen === "book-practice" && n > 1)
    ? `${state.hymnPage + 1} / ${n}` : "";
  // Tap navigation: in book-practice tap moves between drills.
  // For hymn-practice with the full hymn rendered, taps do nothing.
  container.onclick = (e) => {
    if (state.screen !== "book-practice") return;
    const rect = container.getBoundingClientRect();
    const left = (e.clientX - rect.left) < rect.width / 2;
    if (left) prevDrill();

}
// Scale a stack of .abc systems via CSS `zoom` so the whole stack fits
// the stage. zoom (unlike transform:scale) resizes the layout box too, so
// stacked SVGs don't overlap and the container's overflow honors the new
// size. Supported in Chromium-based WebViews (Android).
function fitStackToStage(container) {
  const stack = container.querySelector(".abc-stack");
  if (!stack) return;
  // First, align Roman-numeral chord annotations to a single horizontal
  // line above the staff in each SVG. Must run BEFORE zooming because
  // getBBox returns SVG-user-space coords, unaffected by CSS zoom.
  stack.querySelectorAll("svg").forEach(alignChordAnnotations);
  stack.style.zoom = "1";
  const sRect = stack.getBoundingClientRect();
  if (!sRect.width || !sRect.height) return;
  const cRect = container.getBoundingClientRect();
  const sx = (cRect.width  * 0.98) / sRect.width;
  const sy = (cRect.height * 0.96) / sRect.height;
  const s  = Math.min(sx, sy);
  if (s > 1.01) stack.style.zoom = s.toFixed(3);
}
// Move all annotation text elements above the staff to a single shared Y so
// the Roman-numeral chord symbols form a horizontal row instead of bobbing
// up and down on each chord stem.
function alignChordAnnotations(svg) {
  // Find the staff's top edge: scan for SHORT horizontal paths near the top.
  // abc2svg draws staff lines as `M x y h w`. Top staff line = the highest
  // (smallest y) such path. Failing that, fall back to the SVG's mid-y.
  let staffTopY = null;
  svg.querySelectorAll("path").forEach(p => {
    const d = p.getAttribute("d") || "";
    const m = d.match(/^M\s*([-\d.]+)\s+([-\d.]+)\s*h\s*([-\d.]+)/);
    if (!m) return;
    const y = parseFloat(m[2]);
    const w = parseFloat(m[3]);
    // Staff lines are wide horizontal strokes. Skip ledger lines (short).
    if (w < 100) return;
    if (staffTopY === null || y < staffTopY) staffTopY = y;
  });
  if (staffTopY === null) {
    try { staffTopY = svg.getBBox().y + svg.getBBox().height * 0.4; } catch (_) { return; }
  }
  // Annotations: text elements above the staff that look like Roman numeral
  // chord symbols (contain a letter). Exclude pure-digit texts (time
  // signature numerals like "4", "3", "6") and any single non-letter glyph.
  const ann = [];
  svg.querySelectorAll("text").forEach(t => {
    const y = parseFloat(t.getAttribute("y") || "0");
    if (y >= staffTopY) return;
    const txt = (t.textContent || "").trim();
    if (!txt) return;
    if (!/[A-Za-z]/.test(txt)) return;   // skip time-sig digits, accidentals
    ann.push(t);
  });
  if (!ann.length) return;
  let topY = Infinity;
  ann.forEach(t => {
    const y = parseFloat(t.getAttribute("y") || "0");
    if (y < topY) topY = y;
  });
  ann.forEach(t => t.setAttribute("y", topY.toFixed(2)));
}

function renderBookPractice() {
  const d = (state.drills || [])[state.drillIdx];
  if (!d) { renderHome(); return; }
  const label = `${d.n} ${d.title}`;
  document.getElementById("prompt").innerHTML =
    `<span>${escapeHtml(label)}</span>` +
    `<span id="hymn-progress" class="hymn-progress"></span>`;
  document.getElementById("main").innerHTML = `
    <div class="drill">
      <div class="hymn-stage tappable" id="hymn-stage">
        <div style="color:var(--fg-dim);text-align:center;padding:24px">loading drill...</div>
      </div>
      <div class="held" id="held"></div>
    </div>`;
  renderHeld();
  // XHR rather than fetch: Android WebView blocks fetch() on file://
  // even with allowFileAccessFromFileURLs set.
  const xhr = new XMLHttpRequest();
  xhr.open("GET", `drills/${state.drillIdx}.abc`);
  xhr.onload = () => {
    const container = document.getElementById("hymn-stage");
    if (!container) return;
    if (xhr.status !== 0 && xhr.status !== 200) {
      container.textContent = "Failed to load drill: HTTP " + xhr.status;
      return;
    }
    const stripped = xhr.responseText.split("\n").filter(line => {
      const lt = line.trim();
      if (/^[TCSwWHNAGORBDQ]:/.test(lt)) return false;
      if (/^%%(header|footer|info|postscript|titlefont|composerfont|leftmargin|rightmargin|topmargin|botmargin|vocalfont|wordsfont|infofont|footerfont|headerfont|partsfont)/.test(lt)) return false;
      if (/^%OH/.test(lt)) return false;
      return true;
    }).join("\n");
    // Match the hymn renderer's pagewidth + scale so the bass clef glyph
    // is the same visual size in both. The drill's source ABC usually has
    // no %%scale, so inject one if missing.
    const hasScale = /^%%scale\s/m.test(stripped);
    let txt = stripped
      .replace(/^%%pagewidth.*$/gm, "%%pagewidth 28cm")
      .replace(/^%%pageheight.*$/gm, "")
      .replace(/^%%scale\s.*$/gm, "%%scale 4")
      .replace(/\[[QI]:[^\]]*\]/g, "")
      .replace(/"\^[^"]*"/g, "");
    if (!hasScale) txt = "%%scale 4\n" + txt;
    const chunks = [];
    if (typeof Abc !== "function") {
      container.textContent = "(abc2svg not loaded)";
      return;
    }
    try {
      const abc = new Abc({
        img_out(s)   { chunks.push(s); },
        errmsg(m,l,c){ console.warn("abc2svg:", m, l, c); },
        read_file()  { return ""; },
        anno_stop()  {},
      });
      abc.tosvg("drill.abc", txt);

      container.textContent = "render error: " + e.message;
      return;

    state.hymnPage  = 0;
    showHymnPage();

    const container = document.getElementById("hymn-stage");

}
// Split abc2svg output into per-system SVG blocks and normalize them so
// each block has the SAME viewBox dimensions. abc2svg emits the first
// system taller than subsequent ones (extra room for clef/key/time-sig
// labels that don't repeat). Without normalization, flex-centering puts
// systems of different heights at different screen Ys, so staff lines
// drift across pages.
//
// Also: the first SVG carries the <style> (music @font-face) and <defs>
// (the #stdef 5-line-staff path that every system <use>s). Later systems
// need that head injected, or staff lines vanish.
function normalizeAbcSystems(chunks) {
  const joined = chunks.join("\n");
  const svgs = joined.match(/<svg[\s\S]*?<\/svg>/g) || [];
  if (!svgs.length) return [];
  // Pull the style + defs out of system 1.
  const styleMatches = svgs[0].match(/<style[\s\S]*?<\/style>/g) || [];
  const defsMatches  = svgs[0].match(/<defs[\s\S]*?<\/defs>/g)  || [];
  const sharedHead   = styleMatches.join("") + defsMatches.join("");
  // Compute the largest viewBox W and H across all systems.
  const vbs = svgs.map(s => {
    const m = s.match(/viewBox="([\d.\s-]+)"/);
    return m ? m[1].split(/\s+/).map(Number) : null;
  });
  const maxW = Math.max(...vbs.filter(Boolean).map(v => v[2]));
  const maxH = Math.max(...vbs.filter(Boolean).map(v => v[3]));
  return svgs.map((s, i) => {
    const vb = vbs[i];
    if (vb) {
      s = s.replace(/viewBox="[^"]+"/, `viewBox="${vb[0]} ${vb[1]} ${maxW} ${maxH}"`)
           .replace(/(<svg\b[^>]*?)\swidth="[^"]*"/,  `$1 width="${maxW}px"`)
           .replace(/(<svg\b[^>]*?)\sheight="[^"]*"/, `$1 height="${maxH}px"`);
    }
    if (i > 0) s = s.replace(/(<svg[^>]*>)/, "$1\n" + sharedHead);
    return s;
  });
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

        ${sep}

        nextTarget();   // re-pick using the new filter set + re-render
      };
    });
  }

    state.streak = 0; saveStats(); renderDrill();
  };
  renderHeld();
}
